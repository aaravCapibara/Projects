<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Checkers</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="Checkers Favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="board-container">
            <div class="game-header">
                <div class="game-title">Retro Checkers</div>
                <div class="game-subtitle">Retro Checkers Game</div>
            </div>
            <div class="game-board" id="gameBoard"></div>
        </div>

        <div class="control-panel">
            <h2>🎮 Control Panel</h2>

            <div class="difficulty-section">
                <label for="difficultySelect">⚙️ Select Difficulty</label>
                <select id="difficultySelect">
                    <option value="easy">🟢 Easy</option>
                    <option value="medium" selected>🟡 Medium</option>
                    <option value="hard">🔴 Hard</option>
                </select>
            </div>

            <div class="game-info">
                <div class="current-turn" id="currentTurn">🔴 TURN: PLAYER</div>
                <div class="score-display">
                    <span class="player-score">🔴 YOU: <span id="playerScore">12</span></span>
                    <span class="bot-score">⚫ BOT: <span id="botScore">12</span></span>
                </div>
                <div class="game-status" id="gameStatus">Select a piece to move</div>
            </div>

            <button class="retro-btn" onclick="startNewGame()">🎯 NEW GAME</button>
            <button class="retro-btn" onclick="undoLastMove()" id="undoBtn" disabled>⬅️ UNDO MOVE</button>
            <button class="retro-btn" onclick="toggleSound()" id="soundBtn">🔊 SOUND: ON</button>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2 id="gameOverTitle">GAME OVER!</h2>
            <p id="gameOverMessage">Victory message</p>
            <button class="retro-btn" onclick="startNewGame(); closeGameOverModal();">🎮 Play again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
